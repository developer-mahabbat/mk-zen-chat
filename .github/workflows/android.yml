name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: webapp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Capacitor
        run: |
          mkdir -p capacitor-app
          cd capacitor-app
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Init Capacitor
        run: |
          cd capacitor-app
          cat > capacitor.config.json << 'CFGEOF'
          {
            "appId": "com.mkzen.chat",
            "appName": "MK Zen Chat",
            "webDir": "../webapp",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          CFGEOF
          cat capacitor.config.json

      - name: Add Android
        run: |
          cd capacitor-app
          npx cap add android

      - name: Fix Kotlin Duplicates
        run: |
          cd capacitor-app/android
          cat >> app/build.gradle << 'GRADLEEOF'
          
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLEEOF

      - name: Build APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          export JAVA_HOME=$JAVA_HOME_21_X64
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mk-zen-chat-apk
          path: capacitor-app/android/app/build/outputs/apk/debug/*.apk

      - name: Prepare Release APK
        if: success()
        run: |
          mkdir -p release
          cp capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk release/mk-zen-chat-v1.0.0.apk 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          name: "MK Zen Chat v1.0.0"
          tag_name: "v1.0.0"
          files: release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
