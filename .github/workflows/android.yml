name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: webapp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Capacitor
        run: |
          mkdir -p capacitor-app
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init --web-dir ../webapp "MK Zen Chat" "com.mkzen.chat"

      - name: Add Android Platform
        run: |
          cd capacitor-app
          npx cap add android

      - name: Sync Web Assets
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Build APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mk-zen-chat-apk
          path: capacitor-app/android/app/build/outputs/apk/debug/*.apk

      - name: Prepare Release APK
        run: |
          mkdir -p release
          cp capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk release/mk-zen-chat-v1.0.0.apk 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          name: "MK Zen Chat v1.0.0"
          tag_name: "v1.0.0"
          files: release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
